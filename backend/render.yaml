services:
  - type: web
    name: factorone-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        fromGroup: factorone-secrets
      - key: JWT_SECRET
        fromGroup: factorone-secrets
      - key: JWT_EXPIRES_IN
        value: 7d
